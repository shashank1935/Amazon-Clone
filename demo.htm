<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flag img {
            height: 20px;
            width: 20px;
        }
        .flag-box {
            display: flex;
            gap: 4px;
        }
        .flag-lang {
            font-size: 0.88rem;
        }
        .en {
            border: none;
            height: 15px;
            width: 13px;
        }
    </style>
</head>

<body>
    <div class="flag-box">
        <div class="flag">
            <img src="image.png" alt="nf">
        </div>
        <div class="flag-lang">EN
        </div>
        <select class="en"></select>
    </div>
</body>

</html>
